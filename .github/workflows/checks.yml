name: Checks
on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  lint:
    runs-on: macos-latest

    steps:
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.0.1'
      - uses: actions/checkout@v2
      
      - name: Cache CocoaPods
        uses: actions/cache@v3
        with:
          path: |
            Pods
            ~/Library/Caches/CocoaPods
            ~/.cocoapods/repos
          key: ${{ runner.os }}-pods-${{ hashFiles('**/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-
      
      - name: Install iOS Simulator
        run: |
          sudo xcodebuild -downloadPlatform iOS
          
      - name: Validation
        run: |
          pod lib lint --verbose --platforms=ios,macos --skip-tests
  
  spm:
    runs-on: macos-latest
    
    steps:
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.0.1'
      - uses: actions/checkout@v2
      - name: SPM validation
        run: |
          swift build
  
  tests:
    runs-on: macos-latest

    steps:
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.0.1'
      - uses: actions/checkout@v2
      
      - name: Cache CocoaPods
        uses: actions/cache@v3
        with:
          path: |
            Pods
            ~/Library/Caches/CocoaPods
            ~/.cocoapods/repos
          key: ${{ runner.os }}-pods-${{ hashFiles('**/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-
      
      - name: Install iOS Simulator
        run: |
          xcrun simctl list runtimes
          for i in 1 2 3; do
            sudo xcodebuild -downloadPlatform iOS && break || sleep 10
          done
          xcrun simctl list runtimes
          
      - name: Tests
        run: |
          fastlane tests
